name: Compile iOS Tweak Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Direct Theos Archive
        run: |
          mkdir -p ${{ github.workspace }}/theos
          curl -L https://github.com -o theos.zip
          unzip -q theos.zip
          mv theos-master/* ${{ github.workspace }}/theos/
          rm -rf theos-master theos.zip

      - name: Setup Direct iOS SDK Archive
        run: |
          mkdir -p ${{ github.workspace }}/theos/sdks
          curl -L https://github.com -o sdks.zip
          unzip -q sdks.zip
          mv sdks-master/* ${{ github.workspace }}/theos/sdks/
          rm -rf sdks-master sdks.zip

      - name: Build Tweak Binary Engine
        run: |
          export THEOS=${{ github.workspace }}/theos
          make package FINALPACKAGE=1
          
      - name: Upload Finished Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-Compiled-Deb
          path: packages/*.deb
