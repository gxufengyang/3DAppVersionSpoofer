name: Compile iOS Tweak Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Install Theos Framework Submodules
        run: |
          git clone --recursive https://github.com ${{ github.workspace }}/theos
          
      - name: Clean and Download Official iOS SDK Packs
        run: |
          rm -rf ${{ github.workspace }}/theos/sdks
          git clone https://github.com ${{ github.workspace }}/theos/sdks

      - name: Build Tweak Binary Engine
        run: |
          export THEOS=${{ github.workspace }}/theos
          make package FINALPACKAGE=1
          
      - name: Upload Finished Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-Compiled-Deb
          path: packages/*.deb
