name: Compile iOS Tweak Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code Repository Freshly
        uses: actions/checkout@v4
        with:
          submodules: false # Prevents the project from hijacking the Git links

      - name: Install Pure Theos Framework
        run: |
          git clone --depth=1 https://github.com ${{ github.workspace }}/clean_theos
          
      - name: Download Pure iOS SDK Packs
        run: |
          git clone --depth=1 https://github.com ${{ github.workspace }}/clean_theos/sdks

      - name: Force Clean Custom Tweak Compilation
        run: |
          export THEOS=${{ github.workspace }}/clean_theos
          make clean
          make package FINALPACKAGE=1
          
      - name: Export Finished Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-Compiled-Deb
          path: packages/*.deb
