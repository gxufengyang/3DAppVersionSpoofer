name: Compile iOS Tweak Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code Repository Freshly
        uses: actions/checkout@v4
        with:
          submodules: false # Force Git to completely ignore the repository's broken internal submodules

      - name: Setup Completely Isolated Directories
        run: |
          mkdir -p ${{ github.workspace }}/clean_theos
          mkdir -p ${{ github.workspace }}/clean_theos/sdks

      - name: Fetch Official Framework via Independent HTTP
        run: |
          curl -L "https://github.com" -o theos.zip
          unzip -q theos.zip
          mv theos-master/* ${{ github.workspace }}/clean_theos/
          rm -rf theos-master theos.zip

      - name: Fetch Official SDK Packs via Independent HTTP
        run: |
          curl -L "https://github.com" -o sdks.zip
          unzip -q sdks.zip
          mv sdks-master/* ${{ github.workspace }}/clean_theos/sdks/
          rm -rf sdks-master sdks.zip

      - name: Force Clean Custom Tweak Compilation
        run: |
          export THEOS=${{ github.workspace }}/clean_theos
          # Erase target architecture caches that conflict with the local files
          make clean
          make package FINALPACKAGE=1
          
      - name: Export Finished Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-Compiled-Deb
          path: packages/*.deb
