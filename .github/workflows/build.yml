name: Compile iOS Tweak Packages

on:
  workflow_dispatch: # Allows you to manually trigger the build with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # 1. Use the pre-built, community-approved Theos setup tool
      - name: Setup Theos Compiler Environment
        uses: beerpiss/theos-action@v1
        with:
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/theos/sdks
          cache: true

      # 2. Compile the package natively 
      - name: Build Tweak Binary Archive
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      # 3. Export the finished package out of the cloud runner
      - name: Upload Finished Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-Compiled-Deb
          path: packages/*.deb
