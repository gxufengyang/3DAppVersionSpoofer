name: Compile iOS Tweak Packages

on:
  workflow_dispatch: # Allows you to manually trigger the build with a button click

jobs:
  build:
    runs-on: macos-latest # Standard macOS engine provides complete iOS developer toolsets

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Install Theos Framework Submodules
        run: |
          git clone --recursive https://github.com $GITHUB_WORKSPACE/theos
          
      - name: Download Official iOS SDK Packs
        run: |
          git clone https://github.com $GITHUB_WORKSPACE/theos/sdks

      - name: Build Tweak Binary Engine
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1

      - name: Upload Finished Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-Compiled-Deb
          path: packages/*.deb
