name: Build Tweak Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          theos-sdks-branch: 'master'

      - name: Install RootHide Header and Library
        run: |
          # Fetch and place the missing roothide.h file into Theos include directory
          curl -sSL "https://githubusercontent.com" -o "${{ github.workspace }}/theos/include/roothide.h"
          
          # Fetch and place the missing stub library for linking
          mkdir -p "${{ github.workspace }}/theos/lib/iphone"
          curl -sSL "https://github.com" -o "${{ github.workspace }}/theos/lib/iphone/libroothide.tbd"

      - name: Compile and Package Tweak
        run: |
          # If building explicitly for Roothide, pass THEOS_PACKAGE_SCHEME=roothide
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-deb
          path: packages/*.deb
          if-no-files-found: error
