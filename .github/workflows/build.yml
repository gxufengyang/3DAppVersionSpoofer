name: Compile iOS Tweak Packages

on:
  workflow_dispatch: # Allows you to manually trigger the build with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Install Compilation Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl clang libssl-dev spear rsync

      - name: Set up Theos Build Environment
        run: |
          export THEOS=/opt/theos
          sudo git clone --recursive https://github.com $THEOS
          
      - name: Download iOS SDK Components
        run: |
          sudo git clone https://github.com /opt/theos/sdks
          
      - name: Compile Tweak Binary Architecture
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1

      - name: Upload Finished Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-Compiled-Deb
          path: packages/*.deb
