name: Build Tweak Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup RootHide Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-src: 'https://github.com/roothide/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          theos-sdks-branch: 'master'

      - name: Checkout RootHide Libraries
        uses: actions/checkout@v4
        with:
          repository: roothide/libroothide
          path: libroothide-src

      - name: Install RootHide Header
        run: |
          cp libroothide-src/roothide-theos.h "${{ github.workspace }}/theos/include/roothide.h"
          rm -rf libroothide-src

      - name: Checkout and Install AltList Headers
        uses: actions/checkout@v4
        with:
          repository: opa334/AltList
          path: altlist-src

      - name: Setup AltList for Theos
        run: |
          # Create a dedicated AltList folder inside the Theos include tree
          mkdir -p "${{ github.workspace }}/theos/include/AltList"
          
          # Move all public header files into the newly created folder
          cp altlist-src/*.h "${{ github.workspace }}/theos/include/AltList/"
          
          # Clean up the cloned source directory
          rm -rf altlist-src

      - name: Compile and Package Tweak
        run: |
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DAppVersionSpoofer-deb
          path: packages/*.deb
          if-no-files-found: error
